<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIND OS</title>
  <!-- 구글 폰트: DM Sans(본문) + Playfair Display(제목 이탤릭) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
  <style>
    /* ── 기본 리셋 ── */
    *{ margin:0; padding:0; box-sizing:border-box; }
    body{
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      background: #f5f0ff;  /* 보라 계열 메인 배경 */
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 16px;
    }

    /* ── 페이지 진입 애니메이션 ── */
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(16px); }
      to   { opacity:1; transform:translateY(0); }
    }
    body { animation: fadeUp .4s cubic-bezier(.4,0,.2,1); }

    /* ── 배경 blob (유리구슬처럼 흐릿하게 떠있는 색상 원) ── */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(72px);
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }
    .b1 { width:420px; height:420px; background:#c4b5fd; top:-100px;  left:-80px;  animation: bm1 10s ease-in-out infinite; }
    .b2 { width:340px; height:340px; background:#fbcfe8; top:40px;    right:-70px; animation: bm2 13s ease-in-out infinite; }
    .b3 { width:300px; height:300px; background:#bfdbfe; bottom:-70px;left:28%;    animation: bm3 11s ease-in-out infinite; }
    .b4 { width:240px; height:240px; background:#a7f3d0; bottom:10px; right:8%;    animation: bm1 14s ease-in-out infinite 2s; }

    /* blob 움직임 키프레임 */
    @keyframes bm1 { 0%,100%{transform:translate(0,0) scale(1)}   50%{transform:translate(20px,25px) scale(1.05)} }
    @keyframes bm2 { 0%,100%{transform:translate(0,0) scale(1)}   50%{transform:translate(-18px,20px) scale(0.97)} }
    @keyframes bm3 { 0%,100%{transform:translate(0,0) scale(1)}   50%{transform:translate(15px,-20px) scale(1.03)} }

    /* ── 헤더 ── */
    .main-header {
      position: relative;
      z-index: 10;
      text-align: center;
      margin-bottom: 10px;
    }
    .main-badge {
      display: inline-block;
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(167,139,250,0.35);
      border-radius: 20px;
      padding: 4px 18px;
      font-size: 11px;
      letter-spacing: 2.5px;
      color: #7c3aed;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .main-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(32px, 6vw, 46px);
      font-weight: 600;
      line-height: 1.15;
    }
    .main-title em {
      font-style: italic;
      background: linear-gradient(135deg, #a855f7, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── 마인드맵 SVG 영역 ── */
    .mindmap-wrap {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 860px;
    }

    /* 노드(카드) 클릭/호버 효과 */
    .sat { cursor: pointer; }
    .sat .card-g { transition: all 0.25s cubic-bezier(.4,0,.2,1); }
    .sat:hover .card-g {
      filter: brightness(1.03) drop-shadow(0 8px 24px rgba(100,60,200,0.18));
      transform: translateY(-3px);
    }

    /* ── 하단 푸터 ── */
    .main-footer {
      position: relative;
      z-index: 10;
      display: flex;
      gap: 20px;
      margin-top: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .fp {
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(100,80,160,0.4);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .fdot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #a855f7;
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ── SVG 연결선 + 노드 애니메이션 ── */
    @keyframes drawLine  { from{stroke-dashoffset:280} to{stroke-dashoffset:0} }
    @keyframes floatDot  { 0%,100%{opacity:.45} 50%{opacity:1} }
    @keyframes spinR     { to{transform:rotate(360deg)} }
    @keyframes spinRR    { to{transform:rotate(-360deg)} }

    /* ── 모바일 카드 레이아웃 ── */
    /* 폰에서는 SVG 마인드맵 대신 이 레이아웃이 보임 */
    .mobile-map { display: none; width: 100%; max-width: 480px; }

    /* your space 센터 카드 — 상단에 넓게 */
    .mob-center {
      display: flex;
      align-items: center;
      gap: 14px;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(14px);
      border: 1.5px solid #e9d5ff;
      border-radius: 22px;
      padding: 18px 20px;
      margin-bottom: 13px;
      cursor: pointer;
      transition: all .22s;
      box-shadow: 0 4px 20px rgba(168,139,250,0.15);
      /* 탑 컬러 바 효과: box-shadow 대신 border-top으로 */
      border-top: 4px solid #c4b5fd;
    }
    .mob-center:active { transform: scale(0.98); }
    .mob-center-avatar {
      width: 52px; height: 52px;
      background: #f5f3ff;
      border: 1.5px solid #e9d5ff;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .mob-center-text { flex: 1; }
    .mob-center-title {
      font-size: 15px; font-weight: 700;
      color: #6d28d9; letter-spacing: 1.5px;
      margin-bottom: 3px;
    }
    .mob-center-sub { font-size: 12px; color: #a78bfa; }

    /* 5개 노드 2열 그리드 */
    .mob-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    /* 마지막 홀수 카드(Buffer)는 가운데 정렬 */
    .mob-grid .mob-card:last-child:nth-child(odd) {
      grid-column: 1 / -1;
      max-width: calc(50% - 5px);
      margin: 0 auto;
    }

    /* 각 카드 공통 스타일 */
    .mob-card {
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(14px);
      border: 1.5px solid #f3f4f6;
      border-radius: 20px;
      padding: 16px 14px 14px;
      cursor: pointer;
      transition: all .22s;
      box-shadow: 0 3px 14px rgba(0,0,0,0.07);
      position: relative;
      overflow: hidden;
    }
    .mob-card:active { transform: scale(0.97); }
    /* 상단 컬러 바 */
    .mob-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      border-radius: 20px 20px 0 0;
      background: var(--card-color);
    }
    .mob-card-emoji { font-size: 22px; margin-bottom: 8px; }
    .mob-card-name {
      font-size: 13px; font-weight: 700;
      margin-bottom: 4px;
      color: var(--card-dark);
    }
    .mob-card-desc { font-size: 10.5px; color: #9ca3af; line-height: 1.5; }

    /* PC에서는 모바일 레이아웃 숨기기, 900px 이하에서 SVG 숨기기 */
    @media (max-width: 900px) {
      .mindmap-wrap { display: none; }  /* SVG 마인드맵 숨김 */
      .mobile-map   { display: block; } /* 모바일 카드 레이아웃 표시 */
      body { justify-content: flex-start; padding-top: 36px; }
      .main-header { margin-bottom: 18px; }
    }
  </style>
</head>
<body>

  <!-- 배경 blob들 -->
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
  <div class="blob b4"></div>

  <!-- 헤더 -->
  <div class="main-header">
    <div class="main-badge">✦ Personal OS</div>
    <div class="main-title"><em>MIND OS</em></div>
  </div>

  <!-- 마인드맵 SVG — 5개 카테고리 노드 -->
  <div class="mindmap-wrap">
    <svg viewBox="0 0 860 530" style="width:100%;overflow:visible">
      <defs>
        <!-- 센터 원 그라디언트 -->
        <radialGradient id="cg" cx="50%" cy="50%" r="50%">
          <stop offset="0%"   stop-color="rgba(168,139,250,0.2)"/>
          <stop offset="100%" stop-color="rgba(168,139,250,0)"/>
        </radialGradient>
        <!-- 노드 그림자 필터 -->
        <filter id="sf" x="-25%" y="-25%" width="150%" height="150%">
          <feDropShadow dx="0" dy="5" stdDeviation="10" flood-color="rgba(100,60,200,0.12)"/>
        </filter>
        <!-- 센터 강한 글로우 필터 -->
        <filter id="cf" x="-35%" y="-35%" width="170%" height="170%">
          <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="rgba(168,139,250,0.38)"/>
        </filter>
      </defs>

      <!-- 배경 원 -->
      <circle cx="430" cy="268" r="170" fill="url(#cg)"/>
      <!-- 회전하는 점선 원 -->
      <circle cx="430" cy="268" r="105" fill="none" stroke="rgba(168,139,250,0.17)" stroke-width="1.2"
        stroke-dasharray="6 5" style="animation:spinR 22s linear infinite;transform-origin:430px 268px"/>
      <circle cx="430" cy="268" r="132" fill="none" stroke="rgba(236,72,153,0.1)" stroke-width="1"
        stroke-dasharray="3 10" style="animation:spinRR 32s linear infinite;transform-origin:430px 268px"/>

      <!-- ── 연결선 (센터 → 각 노드) ── -->
      <!-- Bio-Log 연결선 (보라) -->
      <line x1="398" y1="196" x2="322" y2="130"
        stroke="rgba(167,139,250,0.48)" stroke-width="2" stroke-dasharray="280"
        style="animation:drawLine 1s ease .05s both"/>
      <circle cx="322" cy="130" r="4.5" fill="#a78bfa" style="animation:floatDot 2.2s ease-in-out infinite"/>

      <!-- Empire 연결선 (분홍) -->
      <line x1="502" y1="196" x2="578" y2="130"
        stroke="rgba(251,113,133,0.48)" stroke-width="2" stroke-dasharray="280"
        style="animation:drawLine 1s ease .15s both"/>
      <circle cx="578" cy="130" r="4.5" fill="#fb7185" style="animation:floatDot 2.2s ease-in-out infinite .3s"/>

      <!-- Academy 연결선 (하늘) -->
      <line x1="534" y1="295" x2="618" y2="310"
        stroke="rgba(56,189,248,0.48)" stroke-width="2" stroke-dasharray="280"
        style="animation:drawLine 1s ease .25s both"/>
      <circle cx="618" cy="310" r="4.5" fill="#38bdf8" style="animation:floatDot 2.2s ease-in-out infinite .5s"/>

      <!-- Buffer 연결선 (노랑) -->
      <line x1="450" y1="356" x2="450" y2="422"
        stroke="rgba(251,191,36,0.52)" stroke-width="2" stroke-dasharray="280"
        style="animation:drawLine 1s ease .35s both"/>
      <circle cx="450" cy="422" r="4.5" fill="#fbbf24" style="animation:floatDot 2.2s ease-in-out infinite .7s"/>

      <!-- Capital 연결선 (초록) -->
      <line x1="366" y1="295" x2="282" y2="310"
        stroke="rgba(52,211,153,0.48)" stroke-width="2" stroke-dasharray="280"
        style="animation:drawLine 1s ease .45s both"/>
      <circle cx="282" cy="310" r="4.5" fill="#34d399" style="animation:floatDot 2.2s ease-in-out infinite 1s"/>

      <!-- ── 센터 노드 — your space 클릭하면 yourspace.html로 이동 ── -->
      <g filter="url(#cf)" onclick="location.href='yourspace.html'" style="cursor:pointer"
         onmouseenter="this.style.opacity='.85'" onmouseleave="this.style.opacity='1'">
        <circle cx="430" cy="268" r="82" fill="white" fill-opacity="0.88" stroke="#d8b4fe" stroke-width="1.8"/>
        <circle cx="430" cy="250" r="28" fill="#f5f3ff" stroke="#e9d5ff" stroke-width="1.2"/>
        <circle cx="430" cy="243" r="10" fill="#ddd6fe"/>
        <path d="M422 251 Q430 258 438 251" fill="none" stroke="#a78bfa" stroke-width="1.8" stroke-linecap="round"/>
        <circle cx="426" cy="243" r="2.2" fill="#a78bfa"/>
        <circle cx="434" cy="243" r="2.2" fill="#a78bfa"/>
        <text x="430" y="285" text-anchor="middle" font-family="'DM Sans',sans-serif"
          font-size="11" font-weight="600" fill="#6d28d9" letter-spacing="2.5">MIND OS</text>
        <text x="430" y="299" text-anchor="middle" font-family="'DM Sans',sans-serif"
          font-size="9" fill="#a78bfa" letter-spacing="1">your space ✦</text>
      </g>

      <!-- ── 카테고리 노드 1: Bio-Log (좌상단) ── -->
      <!-- onclick: biolog.html 파일로 이동 -->
      <g class="sat" onclick="location.href='biolog.html'" filter="url(#sf)">
        <g class="card-g">
          <rect x="246" y="60" width="162" height="108" rx="20"
            fill="white" fill-opacity="0.88" stroke="#e9d5ff" stroke-width="1.5"/>
          <rect x="246" y="60" width="162" height="7" rx="3.5" fill="#c4b5fd" opacity="0.78"/>
          <text x="268" y="104" font-size="20">📓</text>
          <text x="352" y="96"  text-anchor="middle" font-family="'DM Sans',sans-serif"
            font-size="12.5" font-weight="600" fill="#5b21b6">Bio-Log</text>
          <text x="352" y="113" text-anchor="middle" font-family="'DM Sans',sans-serif"
            font-size="9.5" fill="#8b5cf6" opacity="0.85">운동 · 식단 · 피부</text>
          <text x="352" y="127" text-anchor="middle" font-family="'DM Sans',sans-serif"
            font-size="9.5" fill="#8b5cf6" opacity="0.85">수면 · 생활습관</text>
          <text x="327" y="152" text-anchor="middle" font-family="'DM Sans',sans-serif"
            font-size="9" fill="#a78bfa" opacity="0.6">tap to open →</text>
        </g>
      </g>

      <!-- ── 카테고리 노드 2: Empire (우상단) ── -->
      <g class="sat" onclick="location.href='empire.html'" filter="url(#sf)">
        <g class="card-g">
          <rect x="486" y="60" width="162" height="108" rx="20"
            fill="white" fill-opacity="0.88" stroke="#fecdd3" stroke-width="1.5"/>
          <rect x="486" y="60" width="162" height="7" rx="3.5" fill="#fda4af" opacity="0.78"/>
          <text x="508" y="104" font-size="20">🌟</text>
          <text x="592" y="96"  text-anchor="middle" font-family="'DM Sans',sans-serif"
            font-size="12.5" font-weight="600" fill="#be123c">Empire</text>
          <text x="592" y="113" text-anchor="middle" font-family="'DM Sans',sans-serif"
            font-size="9.5" fill="#f43f5e" opacity="0.85">프로젝트 · 아이디어</text>
          <text x="592" y="127" text-anchor="middle" font-family="'DM Sans',sans-serif"
            font-size="9.5" fill="#f43f5e" opacity="0.85">크리에이팅</text>
          <text x="567" y="152" text-anchor="middle" font-family="'DM Sans',sans-serif"
            font-size="9" fill="#fda4af" opacity="0.6">tap to open →</text>
        </g>
      </g>

      <!-- ── 카테고리 노드 3: Academy (우측) ── -->
      <g class="sat" onclick="location.href='academy.html'" filter="url(#sf)">
        <g class="card-g">
          <rect x="572" y="277" width="162" height="108" rx="20"
            fill="white" fill-opacity="0.88" stroke="#bae6fd" stroke-width="1.5"/>
          <rect x="572" y="277" width="162" height="7" rx="3.5" fill="#7dd3fc" opacity="0.78"/>
          <text x="594" y="322" font-size="20">📚</text>
          <text x="676" y="314" text-anchor="middle" font-family="'DM Sans',sans-serif"
            font-size="12.5" font-weight="600" fill="#0369a1">Academy</text>
          <text x="676" y="332" text-anchor="middle" font-family="'DM Sans',sans-serif"
            font-size="9.5" fill="#0ea5e9" opacity="0.85">독서 · 대학공부</text>
          <text x="653" y="371" text-anchor="middle" font-family="'DM Sans',sans-serif"
            font-size="9" fill="#7dd3fc" opacity="0.6">tap to open →</text>
        </g>
      </g>

      <!-- ── 카테고리 노드 4: Buffer (하단) ── -->
      <g class="sat" onclick="location.href='buffer.html'" filter="url(#sf)">
        <g class="card-g">
          <rect x="349" y="430" width="182" height="88" rx="20"
            fill="white" fill-opacity="0.88" stroke="#fde68a" stroke-width="1.5"/>
          <rect x="349" y="430" width="182" height="7" rx="3.5" fill="#fcd34d" opacity="0.78"/>
          <text x="371" y="468" font-size="20">🛡️</text>
          <text x="449" y="460" text-anchor="middle" font-family="'DM Sans',sans-serif"
            font-size="12.5" font-weight="600" fill="#92400e">Buffer</text>
          <text x="449" y="477" text-anchor="middle" font-family="'DM Sans',sans-serif"
            font-size="9.5" fill="#d97706" opacity="0.85">여가 · 일기 · 리커버리</text>
          <text x="449" y="508" text-anchor="middle" font-family="'DM Sans',sans-serif"
            font-size="9" fill="#fcd34d" opacity="0.6">tap to open →</text>
        </g>
      </g>

      <!-- ── 카테고리 노드 5: Capital (좌측) ── -->
      <g class="sat" onclick="location.href='capital.html'" filter="url(#sf)">
        <g class="card-g">
          <rect x="166" y="277" width="162" height="108" rx="20"
            fill="white" fill-opacity="0.88" stroke="#a7f3d0" stroke-width="1.5"/>
          <rect x="166" y="277" width="162" height="7" rx="3.5" fill="#6ee7b7" opacity="0.78"/>

          <text x="270" y="314" text-anchor="middle" font-family="'DM Sans',sans-serif"

          <text x="247" y="371" text-anchor="middle" font-family="'DM Sans',sans-serif"

        </g>
      </g>

    </svg>
  </div>

  <!-- ── 모바일 전용 카드 레이아웃 (폰에서만 보임) ── -->
  <div class="mobile-map">

    <!-- 센터 노드: your space -->
    <div class="mob-center" onclick="location.href='yourspace.html'">
      <div class="mob-center-avatar">🪐</div>
      <div class="mob-center-text">
        <div class="mob-center-title">MIND OS</div>
        <div class="mob-center-sub">your space ✦ — 개인 허브</div>
      </div>
      <div style="color:#d8b4fe;font-size:16px;">›</div>
    </div>

    <!-- 5개 카테고리 카드 그리드 -->
    <div class="mob-grid">

      <!-- Bio-Log -->
      <div class="mob-card" onclick="location.href='biolog.html'"
           style="--card-color:#c4b5fd; --card-dark:#5b21b6;">
        <div class="mob-card-emoji">📓</div>
        <div class="mob-card-name">Bio-Log</div>
        <div class="mob-card-desc">운동 · 식단<br>피부 · 수면</div>
      </div>

      <!-- Empire -->
      <div class="mob-card" onclick="location.href='empire.html'"
           style="--card-color:#fda4af; --card-dark:#be123c;">
        <div class="mob-card-emoji">🌟</div>
        <div class="mob-card-name">Empire</div>
        <div class="mob-card-desc">프로젝트<br>아이디어 · 크리에이팅</div>
      </div>

      <!-- Academy -->
      <div class="mob-card" onclick="location.href='academy.html'"
           style="--card-color:#7dd3fc; --card-dark:#0369a1;">
        <div class="mob-card-emoji">📚</div>
        <div class="mob-card-name">Academy</div>
        <div class="mob-card-desc">독서 · 대학공부</div>
      </div>

      <!-- Capital -->
      <div class="mob-card" onclick="location.href='capital.html'"
           style="--card-color:#6ee7b7; --card-dark:#065f46;">
        <div class="mob-card-emoji">💰</div>
        <div class="mob-card-name">Capital</div>
        <div class="mob-card-desc">가계부 · 재테크<br>경제</div>
      </div>

      <!-- Buffer — 홀수 번째라 자동으로 가운데 정렬됨 -->
