<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>재테크 — Capital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyBC_aeuuKXoJIodrmfeQ52bvWpzcZMrtPM",
      authDomain: "mind-os-b23a5.firebaseapp.com",
      projectId: "mind-os-b23a5",
      storageBucket: "mind-os-b23a5.firebasestorage.app",
      messagingSenderId: "88544003760",
      appId: "1:88544003760:web:58af8d47183d2e259d9d75"
    });
    const db = firebase.firestore();
  </script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      font-family:'DM Sans',sans-serif;
      min-height:100vh;
      background:#f0fdf4;
      overflow-x:hidden;
      color:#052e16;
    }
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    body{animation:fadeUp .35s cubic-bezier(.4,0,.2,1);}

    /* ── blob ── */
    .blob{position:fixed;border-radius:50%;filter:blur(72px);pointer-events:none;z-index:0;opacity:0.4;}
    .b1{width:420px;height:420px;background:#a7f3d0;top:-90px;left:-70px;animation:bm1 11s ease-in-out infinite;}
    .b2{width:340px;height:340px;background:#99f6e4;top:20px;right:-60px;animation:bm2 14s ease-in-out infinite;}
    .b3{width:300px;height:300px;background:#fde68a;bottom:-60px;left:35%;animation:bm3 12s ease-in-out infinite;}
    @keyframes bm1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(20px,25px) scale(1.06)}}
    @keyframes bm2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-16px,20px) scale(0.97)}}
    @keyframes bm3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(14px,-20px) scale(1.04)}}

    .page-wrap{position:relative;z-index:1;max-width:860px;width:100%;margin:0 auto;padding:20px 14px 100px;}

    /* ── 뒤로가기 ── */
    .back-btn{
      display:inline-flex;align-items:center;gap:6px;
      padding:7px 16px;background:rgba(255,255,255,.82);backdrop-filter:blur(10px);
      border:1px solid rgba(110,231,183,.5);border-radius:20px;
      font-size:12px;font-weight:500;cursor:pointer;margin-bottom:20px;
      transition:all .2s;color:#065f46;font-family:'DM Sans',sans-serif;
    }
    .back-btn:hover{background:rgba(255,255,255,.95);transform:translateX(-3px);}

    /* ── 헤더 ── */
    .page-badge{display:inline-block;background:#d1fae5;border:1px solid #6ee7b7;border-radius:12px;padding:3px 12px;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#065f46;font-weight:500;margin-bottom:8px;}
    .page-title{font-family:'Playfair Display',serif;font-size:clamp(22px,5vw,30px);font-weight:600;color:#064e3b;margin-bottom:18px;}
    .page-title em{font-style:italic;background:linear-gradient(135deg,#059669,#0d9488);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

    /* ══════════════════════════════
       총자산 히어로 카드
       가장 눈에 띄어야 하는 핵심 숫자
    ══════════════════════════════ */
    .hero-card{
      background:linear-gradient(135deg,#059669 0%,#0d9488 60%,#0891b2 100%);
      border-radius:24px;padding:28px 24px 24px;
      margin-bottom:14px;
      box-shadow:0 12px 40px rgba(5,150,105,.3);
      position:relative;overflow:hidden;
    }
    /* 히어로 카드 안 반짝이는 원 (순수 CSS 장식) */
    .hero-card::before{
      content:'';position:absolute;width:200px;height:200px;
      border-radius:50%;background:rgba(255,255,255,.07);
      top:-60px;right:-40px;
    }
    .hero-card::after{
      content:'';position:absolute;width:120px;height:120px;
      border-radius:50%;background:rgba(255,255,255,.05);
      bottom:-30px;left:20px;
    }
    .hero-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.7);margin-bottom:10px;}
    .hero-amount{font-size:clamp(28px,7vw,42px);font-weight:800;color:white;line-height:1;margin-bottom:6px;position:relative;z-index:1;}
    .hero-sub{font-size:12px;color:rgba(255,255,255,.65);position:relative;z-index:1;}

    /* 히어로 카드 안 작은 3칸 */
    .hero-stats{
      display:grid;grid-template-columns:1fr 1fr 1fr;
      gap:10px;margin-top:20px;position:relative;z-index:1;
    }
    .hero-stat{
      background:rgba(255,255,255,.12);border-radius:14px;
      padding:10px 12px;
    }
    .hero-stat-label{font-size:10px;color:rgba(255,255,255,.65);letter-spacing:.8px;text-transform:uppercase;margin-bottom:4px;}
    .hero-stat-val{font-size:clamp(13px,3vw,16px);font-weight:700;color:white;}
    .hero-stat-val.pos{color:#6ee7b7;}
    .hero-stat-val.neg{color:#fca5a5;}

    /* ══════════════════════════════
       자산 유형 필터 탭
    ══════════════════════════════ */
    .filter-tabs{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px;}
    .filter-tab{
      padding:8px 16px;border-radius:20px;font-size:12px;font-weight:500;
      cursor:pointer;border:1.5px solid transparent;transition:all .2s;
      font-family:'DM Sans',sans-serif;min-height:36px;white-space:nowrap;
    }
    .filter-tab.active{background:white;border-color:#6ee7b7;color:#065f46;box-shadow:0 2px 12px rgba(5,150,105,.15);}
    .filter-tab:not(.active){background:rgba(255,255,255,.45);color:#6b7280;}
    .filter-tab:not(.active):hover{background:rgba(255,255,255,.72);}

    /* ══════════════════════════════
       자산 추가 버튼
    ══════════════════════════════ */
    .add-asset-btn{
      display:flex;align-items:center;justify-content:center;gap:8px;
      width:100%;padding:13px;margin-bottom:16px;
      background:rgba(5,150,105,.07);border:2px dashed #6ee7b7;
      border-radius:18px;color:#059669;font-size:13px;font-weight:600;
      cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;
    }
    .add-asset-btn:hover{background:rgba(5,150,105,.14);border-style:solid;}

    /* ══════════════════════════════
       자산 카드
    ══════════════════════════════ */
    .asset-card{
      background:rgba(255,255,255,.88);backdrop-filter:blur(14px);
      border:1.5px solid rgba(255,255,255,.95);border-radius:20px;
      margin-bottom:12px;overflow:hidden;
      box-shadow:0 4px 18px rgba(0,0,0,.07);transition:all .22s;
    }
    .asset-card:hover{box-shadow:0 8px 28px rgba(0,0,0,.11);}

    /* 카드 상단 헤더 (항상 보임) */
    .asset-header{
      display:flex;align-items:center;gap:14px;
      padding:16px 18px;cursor:pointer;
    }

    /* 왼쪽 타입 아이콘 원 */
    .asset-type-icon{
      width:44px;height:44px;border-radius:14px;
      display:flex;align-items:center;justify-content:center;
      font-size:20px;flex-shrink:0;
    }
    .icon-savings {background:linear-gradient(135deg,#d1fae5,#a7f3d0);}
    .icon-deposit {background:linear-gradient(135deg,#dbeafe,#bfdbfe);}
    .icon-stock   {background:linear-gradient(135deg,#fef3c7,#fde68a);}
    .icon-cash    {background:linear-gradient(135deg,#f3f4f6,#e5e7eb);}
    .icon-other   {background:linear-gradient(135deg,#fce7f3,#fbcfe8);}

    .asset-info{flex:1;min-width:0;}
    .asset-name{font-size:14px;font-weight:700;color:#111827;margin-bottom:2px;}
    .asset-institution{font-size:11px;color:#9ca3af;}

    /* 오른쪽: 현재 평가액 + 수익률 뱃지 */
    .asset-right{text-align:right;flex-shrink:0;}
    .asset-value{font-size:15px;font-weight:800;color:#064e3b;}
    .asset-badge{
      display:inline-block;font-size:10px;font-weight:700;
      padding:2px 8px;border-radius:8px;margin-top:3px;
    }
    .badge-pos{background:#d1fae5;color:#059669;}
    .badge-neg{background:#fee2e2;color:#dc2626;}
    .badge-zero{background:#f3f4f6;color:#6b7280;}

    /* 카드 펼쳐지는 상세 영역 */
    .asset-body{
      max-height:0;overflow:hidden;
      transition:max-height .35s cubic-bezier(.4,0,.2,1);
      border-top:0 solid transparent;
    }
    .asset-body.open{max-height:600px;border-top:1px solid #f0fdf4;}
    .asset-body-inner{padding:16px 18px;}

    /* 상세 정보 행들 */
    .detail-grid{
      display:grid;grid-template-columns:1fr 1fr;gap:10px;
      margin-bottom:14px;
    }
    .detail-item{}
    .detail-label{font-size:10px;color:#9ca3af;letter-spacing:.8px;text-transform:uppercase;margin-bottom:3px;}
    .detail-value{font-size:13px;font-weight:600;color:#111827;}

    /* 적금 진행률 바 */
    .progress-wrap{margin-bottom:14px;}
    .progress-label-row{display:flex;justify-content:space-between;font-size:11px;color:#6b7280;margin-bottom:6px;}
    .progress-track{background:#e5e7eb;border-radius:99px;height:8px;overflow:hidden;}
    .progress-fill{
      height:100%;border-radius:99px;
      background:linear-gradient(90deg,#059669,#0d9488);
      transition:width .6s cubic-bezier(.4,0,.2,1);
    }

    /* 청년정책 뱃지 */
    .policy-badge{
      display:inline-flex;align-items:center;gap:5px;
      background:linear-gradient(135deg,#ede9fe,#ddd6fe);
      border:1px solid #c4b5fd;border-radius:10px;
      padding:4px 10px;font-size:11px;font-weight:600;color:#5b21b6;
      margin-bottom:12px;
    }

    /* 만기 예상 박스 */
    .maturity-box{
      background:linear-gradient(135deg,#f0fdf4,#dcfce7);
      border:1.5px solid #6ee7b7;border-radius:14px;
      padding:12px 14px;margin-bottom:14px;
    }
    .maturity-box-label{font-size:10px;color:#065f46;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;font-weight:600;}
    .maturity-box-amount{font-size:20px;font-weight:800;color:#059669;}
    .maturity-box-sub{font-size:11px;color:#4a8a6a;margin-top:2px;}

    /* 수정/삭제 버튼 */
    .asset-actions{display:flex;gap:8px;}
    .btn-edit{
      padding:8px 16px;border-radius:10px;
      background:rgba(5,150,105,.08);border:1px solid rgba(5,150,105,.2);
      color:#059669;font-size:12px;font-weight:500;cursor:pointer;
      font-family:'DM Sans',sans-serif;transition:all .18s;
    }
    .btn-edit:hover{background:rgba(5,150,105,.18);}
    .btn-del{
      padding:8px 16px;border-radius:10px;
      background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);
      color:#dc2626;font-size:12px;font-weight:500;cursor:pointer;
      font-family:'DM Sans',sans-serif;transition:all .18s;
    }
    .btn-del:hover{background:rgba(239,68,68,.18);}

    /* 빈 상태 */
    .empty-state{text-align:center;padding:52px 20px;color:#9ca3af;}
    .empty-icon{font-size:40px;margin-bottom:12px;}
    .empty-text{font-size:14px;line-height:1.7;}

    /* ══════════════════════════════
       모달
    ══════════════════════════════ */
    .modal-overlay{
      display:none;position:fixed;inset:0;
      background:rgba(0,0,0,.4);backdrop-filter:blur(5px);
      z-index:100;align-items:center;justify-content:center;padding:16px;
    }
    .modal-overlay.open{display:flex;}
    .modal-box{
      background:white;border-radius:26px;
      padding:26px 22px;width:100%;max-width:500px;
      max-height:92vh;overflow-y:auto;
      box-shadow:0 24px 80px rgba(0,0,0,.22);
      animation:fadeUp .22s cubic-bezier(.4,0,.2,1);
    }
    .modal-title{font-size:17px;font-weight:700;color:#064e3b;margin-bottom:20px;}

    /* 자산 유형 선택 카드 버튼들 */
    .type-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:18px;}
    .type-card{
      border:2px solid #e5e7eb;border-radius:14px;padding:10px 6px;
      text-align:center;cursor:pointer;transition:all .2s;
      font-family:'DM Sans',sans-serif;
    }
    .type-card:hover{border-color:#6ee7b7;background:#f0fdf4;}
    .type-card.active{border-color:#059669;background:#d1fae5;}
    .type-card-emoji{font-size:20px;display:block;margin-bottom:4px;}
    .type-card-label{font-size:10px;font-weight:600;color:#374151;}
    .type-card.active .type-card-label{color:#065f46;}

    /* 청년정책상품 토글 */
    .policy-toggle{
      display:flex;align-items:center;gap:10px;
      padding:12px 14px;border-radius:14px;
      background:#f9fafb;border:1.5px solid #e5e7eb;
      margin-bottom:14px;cursor:pointer;transition:all .2s;
    }
    .policy-toggle.on{background:#ede9fe;border-color:#c4b5fd;}
    .policy-toggle-dot{
      width:36px;height:20px;border-radius:10px;
      background:#d1d5db;position:relative;transition:all .2s;flex-shrink:0;
    }
    .policy-toggle-dot::after{
      content:'';position:absolute;width:16px;height:16px;
      border-radius:50%;background:white;top:2px;left:2px;
      transition:all .2s;box-shadow:0 1px 4px rgba(0,0,0,.2);
    }
    .policy-toggle.on .policy-toggle-dot{background:#7c3aed;}
    .policy-toggle.on .policy-toggle-dot::after{left:18px;}
    .policy-toggle-text{font-size:13px;font-weight:600;color:#374151;}
    .policy-toggle.on .policy-toggle-text{color:#5b21b6;}

    /* 숨김 처리 */
    .hidden{display:none;}

    .form-group{margin-bottom:14px;}
    .form-label{display:block;font-size:11px;font-weight:600;color:#6b7280;letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px;}
    .form-input,.form-select{
      width:100%;padding:10px 14px;
      border:1.5px solid #e5e7eb;border-radius:12px;
      font-size:14px;font-family:'DM Sans',sans-serif;
      color:#111827;background:#f9fafb;transition:border-color .18s;
    }
    .form-input:focus,.form-select:focus{outline:none;border-color:#6ee7b7;background:white;}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .form-hint{font-size:11px;color:#9ca3af;margin-top:4px;}

    .modal-actions{display:flex;gap:10px;margin-top:22px;}
    .btn-primary{
      flex:1;padding:12px;
      background:linear-gradient(135deg,#059669,#0d9488);
      color:white;border:none;border-radius:14px;
      font-size:13px;font-weight:600;cursor:pointer;
      font-family:'DM Sans',sans-serif;transition:all .2s;
    }
    .btn-primary:hover{opacity:.88;}
    .btn-secondary{
      padding:12px 18px;background:rgba(255,255,255,.7);
      color:#374151;border:1.5px solid rgba(0,0,0,.12);
      border-radius:14px;font-size:13px;font-weight:500;
      cursor:pointer;font-family:'DM Sans',sans-serif;
    }
    .btn-secondary:hover{background:white;}

    /* 토스트 */
    #toast{
      position:fixed;bottom:28px;left:50%;
      transform:translateX(-50%) translateY(20px);
      background:rgba(4,47,30,.92);backdrop-filter:blur(14px);
      color:white;padding:12px 22px;border-radius:18px;
      font-size:13px;font-weight:500;opacity:0;
      transition:all .3s cubic-bezier(.4,0,.2,1);
      pointer-events:none;z-index:200;white-space:nowrap;
    }
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

    @media(max-width:480px){
      .type-grid{grid-template-columns:repeat(3,1fr);}
      .form-row{grid-template-columns:1fr;}
      .hero-stats{grid-template-columns:1fr 1fr;}
    }
  </style>
</head>
<body>

  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
  <div id="toast"></div>

  <div class="page-wrap">

    <button class="back-btn" onclick="location.href='capital.html'">← Capital</button>

    <div class="page-badge">💰 Capital</div>
    <h1 class="page-title">내 <em>재테크</em></h1>

    <!-- 총자산 히어로 카드 -->
    <div class="hero-card" id="heroCard">
      <div class="hero-label">TOTAL NET WORTH</div>
      <div class="hero-amount" id="heroTotal">₩0</div>
      <div class="hero-sub" id="heroSub">자산을 추가해서 총자산을 관리해요</div>
      <div class="hero-stats">
        <div class="hero-stat">
          <div class="hero-stat-label">투자 원금</div>
          <div class="hero-stat-val" id="heroPrincipal">₩0</div>
        </div>
        <div class="hero-stat">
          <div class="hero-stat-label">평가 손익</div>
          <div class="hero-stat-val" id="heroProfit">₩0</div>
        </div>
        <div class="hero-stat">
          <div class="hero-stat-label">수익률</div>
          <div class="hero-stat-val" id="heroRate">0%</div>
        </div>
      </div>
    </div>

    <!-- 자산 유형 필터 탭 -->
    <div class="filter-tabs">
      <button class="filter-tab active" onclick="setFilter('all')">전체</button>
      <button class="filter-tab" onclick="setFilter('savings')">🏦 적금</button>
      <button class="filter-tab" onclick="setFilter('deposit')">💳 예금</button>
      <button class="filter-tab" onclick="setFilter('stock')">📈 주식</button>
      <button class="filter-tab" onclick="setFilter('cash')">💵 현금</button>
      <button class="filter-tab" onclick="setFilter('other')">📦 기타</button>
    </div>

    <!-- 자산 추가 버튼 -->
    <button class="add-asset-btn" onclick="openModal()">+ 자산 추가</button>

    <!-- 자산 카드 목록 -->
    <div id="assetList"></div>

  </div>

  <!-- ══════════════════════════════
       자산 추가/수정 모달
  ══════════════════════════════ -->
  <div id="modal" class="modal-overlay" onclick="closeBg(event)">
    <div class="modal-box">
      <div class="modal-title" id="modalTitle">자산 추가</div>

      <!-- 자산 유형 선택 -->
      <div class="form-label" style="margin-bottom:10px;">자산 유형</div>
      <div class="type-grid" id="typeGrid">
        <div class="type-card active" onclick="selectType('savings')">
          <span class="type-card-emoji">🏦</span>
          <span class="type-card-label">적금</span>
        </div>
        <div class="type-card" onclick="selectType('deposit')">
          <span class="type-card-emoji">💳</span>
          <span class="type-card-label">예금</span>
        </div>
        <div class="type-card" onclick="selectType('stock')">
          <span class="type-card-emoji">📈</span>
          <span class="type-card-label">주식</span>
        </div>
        <div class="type-card" onclick="selectType('cash')">
          <span class="type-card-emoji">💵</span>
          <span class="type-card-label">현금</span>
        </div>
        <div class="type-card" onclick="selectType('other')">
          <span class="type-card-emoji">📦</span>
          <span class="type-card-label">기타</span>
        </div>
      </div>

      <!-- 공통 필드 -->
      <div class="form-group">
        <label class="form-label">자산 이름</label>
        <input type="text" id="fName" class="form-input" placeholder="예: 군인적금, 삼성전자">
      </div>
      <div class="form-group">
        <label class="form-label">기관명</label>
        <input type="text" id="fInstitution" class="form-input" placeholder="예: KB국민은행, 미래에셋증권">
      </div>

      <!-- ── 적금/예금 전용 필드 ── -->
      <div id="fields-savings-deposit">

        <!-- 청년정책상품 토글 (적금만) -->
        <div id="policyToggleWrap">
          <div class="policy-toggle" id="policyToggle" onclick="togglePolicy()">
            <div class="policy-toggle-dot"></div>
            <span class="policy-toggle-text">🏛️ 청년 정책 상품 (군인적금·청년도약계좌 등)</span>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">월 납입액 (원)</label>
            <input type="number" id="fMonthly" class="form-input" placeholder="0">
          </div>
          <div class="form-group">
            <label class="form-label">금리 (%)</label>
            <input type="number" id="fRate" class="form-input" placeholder="예: 5.0" step="0.1">
          </div>
        </div>

        <!-- 청년정책 전용 추가 필드 -->
        <div id="policyFields" class="hidden">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">정부 지원금/월 (원)</label>
              <input type="number" id="fGovMonthly" class="form-input" placeholder="0">
              <div class="form-hint">매달 정부가 추가로 넣어주는 금액</div>
            </div>
            <div class="form-group">
              <label class="form-label">우대 금리 (%)</label>
              <input type="number" id="fBonusRate" class="form-input" placeholder="예: 1.0" step="0.1">
            </div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">시작일</label>
            <input type="date" id="fStartDate" class="form-input">
          </div>
          <div class="form-group">
            <label class="form-label">만기일</label>
            <input type="date" id="fEndDate" class="form-input">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">현재까지 납입 회차 (개월)</label>
          <input type="number" id="fPaidMonths" class="form-input" placeholder="예: 3">
        </div>
      </div>

      <!-- ── 주식 전용 필드 ── -->
      <div id="fields-stock" class="hidden">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">매수 평균가 (원)</label>
            <input type="number" id="fAvgPrice" class="form-input" placeholder="0">
          </div>
          <div class="form-group">
            <label class="form-label">보유 수량</label>
            <input type="number" id="fQty" class="form-input" placeholder="0" step="0.01">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">현재가 (원) — 직접 입력</label>
          <input type="number" id="fCurrentPrice" class="form-input" placeholder="0">
          <div class="form-hint">현재 시세를 직접 입력하세요</div>
        </div>
      </div>

      <!-- ── 현금/기타 전용 필드 ── -->
      <div id="fields-cash-other" class="hidden">
        <div class="form-group">
          <label class="form-label">금액 (원)</label>
          <input type="number" id="fCashAmount" class="form-input" placeholder="0">
        </div>
        <div class="form-group">
          <label class="form-label">메모 (선택)</label>
          <input type="text" id="fMemo" class="form-input" placeholder="예: 비상금 통장">
        </div>
      </div>

      <div class="modal-actions">
        <button class="btn-secondary" onclick="closeModal()">취소</button>
        <button class="btn-primary"   onclick="saveAsset()">저장</button>
      </div>
    </div>
  </div>

  <script>
    /* ════════════════════════════════
       데이터 모델
       assets 배열: 각 자산 객체를 담음
    ════════════════════════════════ */
    let data = {
      _savedAt: 0,
      assets: [],
    };

    /* 현재 선택된 필터 */
    let currentFilter = 'all';

    /* 모달 상태 */
    let modalType  = 'savings'; // 현재 선택된 자산 유형
    let isPolicy   = false;     // 청년정책상품 여부
    let editId     = null;      // 수정 중인 자산 ID


    /* ════════════════════════════════
       타입별 아이콘/레이블
    ════════════════════════════════ */
    const TYPE_INFO = {
      savings: { emoji:'🏦', label:'적금',  iconClass:'icon-savings' },
      deposit: { emoji:'💳', label:'예금',  iconClass:'icon-deposit' },
      stock:   { emoji:'📈', label:'주식',  iconClass:'icon-stock'   },
      cash:    { emoji:'💵', label:'현금',  iconClass:'icon-cash'    },
      other:   { emoji:'📦', label:'기타',  iconClass:'icon-other'   },
    };


    /* ════════════════════════════════
       데이터 로드 (Firestore vs localStorage)
    ════════════════════════════════ */

    // 가계부에서 계산된 잔액 — 재테크 페이지에 "현금 (가계부 연동)"으로 표시
    let ledgerBalance = 0;

    // 가계부(capital_ledger) 데이터를 읽어서 잔액 계산
    // 비유: 통장 명세서를 꺼내서 수입-지출 합산하는 것
    function loadLedgerBalance() {
      try {
        const raw = localStorage.getItem('mindos_capital_ledger');
        if (!raw) return;
        const ledger = JSON.parse(raw);
        const txs = ledger.transactions || [];
        ledgerBalance = txs.reduce((sum, tx) => {
          return tx.type === 'income' ? sum + (tx.amount||0) : sum - (tx.amount||0);
        }, 0);
      } catch(e) { console.error('가계부 잔액 계산 실패:', e); }
    }

    async function loadData() {
      // 가계부 잔액 먼저 읽기 (Firestore에서도 최신 가계부 가져오기 시도)
      try {
        const snap = await db.collection('mindos').doc('capital_ledger').get();
        if (snap.exists) {
          // Firestore 가계부가 localStorage보다 최신이면 덮어쓰기
          const fsLedger = snap.data();
          const localRaw = localStorage.getItem('mindos_capital_ledger');
          const localTime = localRaw ? (JSON.parse(localRaw)._savedAt||0) : 0;
          if ((fsLedger._savedAt||0) > localTime) {
            localStorage.setItem('mindos_capital_ledger', JSON.stringify(fsLedger));
          }
        }
      } catch(e) {}
      loadLedgerBalance();  // 가계부 잔액 계산

      // 재테크 자산 데이터 로드
      const local = localStorage.getItem('mindos_capital_invest');
      let localData=null, localTime=0;
      if (local) {
        try { localData=JSON.parse(local); localTime=localData._savedAt||0; } catch(e){}
      }
      try {
        const snap = await db.collection('mindos').doc('capital_invest').get();
        if (snap.exists) {
          const fsData = snap.data();
          if ((fsData._savedAt||0) > localTime) {
            data = {...data, ...fsData};
            localStorage.setItem('mindos_capital_invest', JSON.stringify(data));
            renderAll(); return;
          }
        }
      } catch(e) { console.error('Firestore 로드 실패:', e); }
      if (localData) data = {...data, ...localData};
      renderAll();
    }

    function saveData() {
      data._savedAt = Date.now();
      localStorage.setItem('mindos_capital_invest', JSON.stringify(data));
      db.collection('mindos').doc('capital_invest').set(data)
        .catch(e => console.error('Firestore 저장 실패:', e));
    }


    /* ════════════════════════════════
       필터 전환
    ════════════════════════════════ */
    function setFilter(f) {
      currentFilter = f;
      document.querySelectorAll('.filter-tab').forEach((btn,i) => {
        const filters = ['all','savings','deposit','stock','cash','other'];
        btn.classList.toggle('active', filters[i]===f);
      });
      renderAssets();
    }


    /* ════════════════════════════════
       전체 렌더링
    ════════════════════════════════ */
    function renderAll() {
      renderHero();
      renderAssets();
    }


    /* ════════════════════════════════
       히어로 카드 — 총자산 계산
       총자산 = 모든 자산의 현재 평가액 합산
    ════════════════════════════════ */
    function renderHero() {
      let totalValue=0, totalPrincipal=0;

      // 수동 자산 합산
      (data.assets||[]).forEach(a => {
        const val  = getCurrentValue(a);
        const prin = getPrincipal(a);
        totalValue     += val;
        totalPrincipal += prin;
      });

      // 가계부 잔액도 총자산에 포함 (현금 = 실제 수중에 있는 돈)
      if (ledgerBalance > 0) {
        totalValue     += ledgerBalance;
        totalPrincipal += ledgerBalance;
      }

      const profit  = totalValue - totalPrincipal;
      const profitRate = totalPrincipal > 0
        ? ((profit / totalPrincipal)*100).toFixed(2)
        : 0;

      document.getElementById('heroTotal').textContent     = '₩' + fmt(totalValue);
      document.getElementById('heroPrincipal').textContent = '₩' + fmt(totalPrincipal);

      const profitEl = document.getElementById('heroProfit');
      profitEl.textContent  = (profit>=0?'+':'−') + '₩' + fmt(Math.abs(profit));
      profitEl.className    = 'hero-stat-val ' + (profit>=0?'pos':'neg');

      const rateEl = document.getElementById('heroRate');
      rateEl.textContent = (profitRate>=0?'+':'') + profitRate + '%';
      rateEl.className   = 'hero-stat-val ' + (profitRate>=0?'pos':'neg');

      document.getElementById('heroSub').textContent =
        (data.assets||[]).length > 0
          ? `자산 ${(data.assets||[]).length}개 · 투자 원금 ₩${fmt(totalPrincipal)}`
          : '자산을 추가해서 총자산을 관리해요';
    }


    /* ── 자산별 현재 평가액 계산 ── */
    function getCurrentValue(a) {
      if (a.type==='stock') {
        /* 주식: 현재가 × 수량 */
        return (a.currentPrice||0) * (a.qty||0);
      }
      if (a.type==='savings' || a.type==='deposit') {
        /* 적금/예금: 만기 예상 수령액 계산 */
        return calcMaturity(a).total;
      }
      /* 현금/기타: 입력된 금액 그대로 */
      return a.cashAmount||0;
    }

    /* ── 자산별 원금 계산 ── */
    function getPrincipal(a) {
      if (a.type==='stock')   return (a.avgPrice||0) * (a.qty||0);
      if (a.type==='savings') return (a.monthly||0) * (a.paidMonths||0);
      if (a.type==='deposit') return a.monthly||0;
      return a.cashAmount||0;
    }

    /* ── 적금/예금 만기 예상 수령액 계산 ──
       공식: (내 납입 + 정부 지원) × 개월수 + 이자
       이자는 단리 근사치로 계산
    ── */
    function calcMaturity(a) {
      const totalMonths = getTotalMonths(a);
      if (!totalMonths) return { total:0, myTotal:0, govTotal:0, interest:0 };

      const monthly    = a.monthly    || 0;
      const govMonthly = a.govMonthly || 0;
      const rate       = ((a.rate||0) + (a.bonusRate||0)) / 100;

      /* 단리 근사 — 매달 납입 평균 × 전체 기간 × 금리 */
      const myTotal    = monthly    * totalMonths;
      const govTotal   = govMonthly * totalMonths;
      const principal  = myTotal + govTotal;
      /* 월별 이자 누적 (단리) */
      const interest   = monthly * (rate / 12) * (totalMonths*(totalMonths+1)/2)
                       + govMonthly * (rate / 12) * (totalMonths*(totalMonths+1)/2);

      return { total: Math.round(principal + interest), myTotal, govTotal, interest:Math.round(interest) };
    }

    /* ── 총 개월수 계산 ── */
    function getTotalMonths(a) {
      if (!a.startDate || !a.endDate) return 0;
      const s = new Date(a.startDate), e = new Date(a.endDate);
      return (e.getFullYear()-s.getFullYear())*12 + (e.getMonth()-s.getMonth());
    }

    /* ── D-day 계산 ── */
    function getDday(dateStr) {
      if (!dateStr) return '';
      const diff = Math.ceil((new Date(dateStr) - new Date()) / (1000*60*60*24));
      if (diff > 0)  return `D-${diff}`;
      if (diff === 0) return 'D-day';
      return `만기 ${Math.abs(diff)}일 경과`;
    }

    /* ── 진행률 계산 (적금) ── */
    function getProgress(a) {
      const total = getTotalMonths(a);
      if (!total) return 0;
      return Math.min(Math.round(((a.paidMonths||0)/total)*100), 100);
    }


    /* ════════════════════════════════
       자산 카드 목록 렌더링
    ════════════════════════════════ */
    function renderAssets() {
      const el = document.getElementById('assetList');
      const filtered = (data.assets||[]).filter(a =>
        currentFilter==='all' || a.type===currentFilter
      );

      // 가계부 연동 현금 카드 — 'all' 또는 'cash' 필터일 때만 표시
      let ledgerCardHTML = '';
      if ((currentFilter==='all' || currentFilter==='cash') && ledgerBalance !== 0) {
        const isPositive = ledgerBalance >= 0;
        ledgerCardHTML = `
          <div class="asset-card" style="border-left:3px solid #10b981">
            <div class="asset-card-header">
              <div class="asset-icon icon-cash">💵</div>
              <div class="asset-info">
                <div class="asset-name">현금 <span style="font-size:10px;color:#10b981;font-weight:500;margin-left:4px">가계부 연동 🔗</span></div>
                <div class="asset-type-badge" style="background:#d1fae5;color:#065f46">현금</div>
              </div>
              <div style="text-align:right">
                <div class="asset-cur-val" style="color:${isPositive?'#059669':'#dc2626'}">
                  ${isPositive?'':'−'}₩${fmt(Math.abs(ledgerBalance))}
                </div>
                <div style="font-size:10px;color:#9ca3af;margin-top:2px">가계부 수입−지출</div>
              </div>
            </div>
            <div style="font-size:11px;color:#6b7280;padding:8px 0 0;border-top:1px solid #f3f4f6;margin-top:8px">
              💡 가계부에서 자동으로 계산됩니다. 수정하려면 가계부에서 거래를 수정하세요.
              <button onclick="location.href='capital_ledger.html'"
                style="margin-left:8px;padding:3px 9px;background:#d1fae5;border:none;border-radius:8px;
                       font-size:10px;color:#065f46;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600">
                가계부 열기 →
              </button>
            </div>
          </div>`;
      }

      if (filtered.length===0 && !ledgerCardHTML) {
        el.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">${currentFilter==='all'?'💹':TYPE_INFO[currentFilter]?.emoji||'📦'}</div>
            <div class="empty-text">
              ${currentFilter==='all'?'아직 자산이 없어요':'이 유형의 자산이 없어요'}<br>
              위 버튼으로 자산을 추가해보세요
            </div>
          </div>`;
        return;
      }

      el.innerHTML = ledgerCardHTML + filtered.map(a => assetCardHTML(a)).join('');
    }


    /* ════════════════════════════════
       자산 카드 HTML 생성
    ════════════════════════════════ */
    function assetCardHTML(a) {
      const info     = TYPE_INFO[a.type] || TYPE_INFO.other;
      const curVal   = getCurrentValue(a);
      const prin     = getPrincipal(a);
      const profit   = curVal - prin;
      const profitPct= prin > 0 ? ((profit/prin)*100).toFixed(1) : 0;

      /* 수익률 뱃지 */
      const badgeClass  = profit>0?'badge-pos':profit<0?'badge-neg':'badge-zero';
      const profitSign  = profit>=0?'+':'−';
      const badgeText   = `${profitSign}${Math.abs(profitPct)}%`;

      /* 상세 영역 HTML */
      let detailHTML = '';

      if (a.type==='savings'||a.type==='deposit') {
        const mat      = calcMaturity(a);
        const totalMon = getTotalMonths(a);
        const prog     = getProgress(a);
        const dday     = getDday(a.endDate);

        detailHTML = `
          ${a.isPolicy ? `<div class="policy-badge">🏛️ 청년 정책 상품</div>` : ''}
          ${mat.total>0 ? `
            <div class="maturity-box">
              <div class="maturity-box-label">만기 예상 수령액</div>
              <div class="maturity-box-amount">₩${fmt(mat.total)}</div>
              <div class="maturity-box-sub">
                내 납입 ₩${fmt(mat.myTotal)}
                ${a.isPolicy&&mat.govTotal>0?' + 정부 지원 ₩'+fmt(mat.govTotal):''}
                + 이자 ₩${fmt(mat.interest)}
              </div>
            </div>` : ''}
          <div class="detail-grid">
            <div class="detail-item"><div class="detail-label">월 납입</div><div class="detail-value">₩${fmt(a.monthly||0)}</div></div>
            <div class="detail-item"><div class="detail-label">금리</div><div class="detail-value">${(a.rate||0)+(a.bonusRate||0)}%${a.bonusRate?` (우대 +${a.bonusRate}%)`:''}
            </div></div>
            <div class="detail-item"><div class="detail-label">납입 회차</div><div class="detail-value">${a.paidMonths||0}개월 / ${totalMon}개월</div></div>
            <div class="detail-item"><div class="detail-label">만기일</div><div class="detail-value">${a.endDate||'-'} ${dday?`(${dday})`:''}</div></div>
            ${a.isPolicy&&a.govMonthly?`<div class="detail-item"><div class="detail-label">정부 지원/월</div><div class="detail-value c-green">₩${fmt(a.govMonthly)}</div></div>`:''}
          </div>
          ${totalMon>0?`
            <div class="progress-wrap">
              <div class="progress-label-row">
                <span>진행률 ${prog}%</span>
                <span>${a.paidMonths||0} / ${totalMon} 개월</span>
              </div>
              <div class="progress-track"><div class="progress-fill" style="width:${prog}%"></div></div>
            </div>`:''}`;
      } else if (a.type==='stock') {
        const curPrice = a.currentPrice||0;
        const profitPerShare = curPrice - (a.avgPrice||0);
        detailHTML = `
          <div class="detail-grid">
            <div class="detail-item"><div class="detail-label">매수 평균가</div><div class="detail-value">₩${fmt(a.avgPrice||0)}</div></div>
            <div class="detail-item"><div class="detail-label">현재가</div><div class="detail-value">₩${fmt(curPrice)}</div></div>
            <div class="detail-item"><div class="detail-label">보유 수량</div><div class="detail-value">${a.qty||0}주</div></div>
            <div class="detail-item"><div class="detail-label">주당 손익</div>
              <div class="detail-value" style="color:${profitPerShare>=0?'#059669':'#dc2626'}">
                ${profitPerShare>=0?'+':''}₩${fmt(profitPerShare)}
              </div>
            </div>
            <div class="detail-item"><div class="detail-label">매수 금액</div><div class="detail-value">₩${fmt(prin)}</div></div>
            <div class="detail-item"><div class="detail-label">평가 금액</div><div class="detail-value">₩${fmt(curVal)}</div></div>
          </div>`;
      } else {
        detailHTML = `
          <div class="detail-grid">
            <div class="detail-item"><div class="detail-label">금액</div><div class="detail-value">₩${fmt(a.cashAmount||0)}</div></div>
            ${a.memo?`<div class="detail-item"><div class="detail-label">메모</div><div class="detail-value">${a.memo}</div></div>`:''}
          </div>`;
      }

      return `
        <div class="asset-card" id="acard-${a.id}">
          <div class="asset-header" onclick="toggleCard('${a.id}')">
            <div class="asset-type-icon ${info.iconClass}">${info.emoji}</div>
            <div class="asset-info">
              <div class="asset-name">${a.name}</div>
              <div class="asset-institution">${info.label}${a.institution?' · '+a.institution:''}</div>
            </div>
            <div class="asset-right">
              <div class="asset-value">₩${fmt(curVal)}</div>
              <div class="asset-badge ${badgeClass}">${badgeText}</div>
            </div>
          </div>
          <div class="asset-body" id="abody-${a.id}">
            <div class="asset-body-inner">
              ${detailHTML}
              <div class="asset-actions">
                <button class="btn-edit" onclick="openModal('${a.id}')">수정</button>
                <button class="btn-del"  onclick="deleteAsset('${a.id}')">삭제</button>
              </div>
            </div>
          </div>
        </div>`;
    }


    /* ── 카드 펼치기/접기 ── */
    function toggleCard(id) {
      document.getElementById('abody-'+id).classList.toggle('open');
    }


    /* ════════════════════════════════
       모달 열기/닫기
    ════════════════════════════════ */
    function openModal(id=null) {
      editId = id;
      document.getElementById('modalTitle').textContent = id ? '자산 수정' : '자산 추가';

      if (id) {
        /* 수정 모드 */
        const a = (data.assets||[]).find(x=>x.id===id);
        if (!a) return;
        selectType(a.type);
        document.getElementById('fName').value        = a.name||'';
        document.getElementById('fInstitution').value = a.institution||'';

        if (a.type==='savings'||a.type==='deposit') {
          document.getElementById('fMonthly').value    = a.monthly||'';
          document.getElementById('fRate').value       = a.rate||'';
          document.getElementById('fStartDate').value  = a.startDate||'';
          document.getElementById('fEndDate').value    = a.endDate||'';
          document.getElementById('fPaidMonths').value = a.paidMonths||'';
          if (a.isPolicy) {
            isPolicy = true;
            document.getElementById('policyToggle').classList.add('on');
            document.getElementById('policyFields').classList.remove('hidden');
            document.getElementById('fGovMonthly').value = a.govMonthly||'';
            document.getElementById('fBonusRate').value  = a.bonusRate||'';
          }
        } else if (a.type==='stock') {
          document.getElementById('fAvgPrice').value     = a.avgPrice||'';
          document.getElementById('fQty').value          = a.qty||'';
          document.getElementById('fCurrentPrice').value = a.currentPrice||'';
        } else {
          document.getElementById('fCashAmount').value = a.cashAmount||'';
          document.getElementById('fMemo').value       = a.memo||'';
        }
      } else {
        /* 새 추가 모드 초기화 */
        selectType('savings');
        ['fName','fInstitution','fMonthly','fRate','fStartDate','fEndDate',
         'fPaidMonths','fGovMonthly','fBonusRate','fAvgPrice','fQty',
         'fCurrentPrice','fCashAmount','fMemo'].forEach(id => {
          const el = document.getElementById(id);
          if (el) el.value = '';
        });
        isPolicy = false;
        document.getElementById('policyToggle').classList.remove('on');
        document.getElementById('policyFields').classList.add('hidden');
      }
      document.getElementById('modal').classList.add('open');
    }

    function closeBg(e) {
      if (e.target===document.getElementById('modal')) closeModal();
    }
    function closeModal() {
      document.getElementById('modal').classList.remove('open');
      editId = null;
    }


    /* ── 자산 유형 선택 ── */
    function selectType(type) {
      modalType = type;
      /* 타입 카드 active 표시 */
      const types = ['savings','deposit','stock','cash','other'];
      document.querySelectorAll('.type-card').forEach((el,i)=>{
        el.classList.toggle('active', types[i]===type);
      });
      /* 청년정책 토글은 적금에서만 표시 */
      document.getElementById('policyToggleWrap').style.display =
        type==='savings' ? 'block' : 'none';
      /* 필드 섹션 보이기/숨기기 */
      document.getElementById('fields-savings-deposit').classList.toggle('hidden',
        type!=='savings'&&type!=='deposit');
      document.getElementById('fields-stock').classList.toggle('hidden',      type!=='stock');
      document.getElementById('fields-cash-other').classList.toggle('hidden', type!=='cash'&&type!=='other');
    }

    /* ── 청년정책 토글 ── */
    function togglePolicy() {
      isPolicy = !isPolicy;
      document.getElementById('policyToggle').classList.toggle('on', isPolicy);
      document.getElementById('policyFields').classList.toggle('hidden', !isPolicy);
    }


    /* ════════════════════════════════
       자산 저장
    ════════════════════════════════ */
    function saveAsset() {
      const name        = document.getElementById('fName').value.trim();
      const institution = document.getElementById('fInstitution').value.trim();
      if (!name) { showToast('자산 이름을 입력해주세요'); return; }

      let asset = { id: editId||Date.now().toString(), type:modalType, name, institution };

      if (modalType==='savings'||modalType==='deposit') {
        const monthly    = parseFloat(document.getElementById('fMonthly').value)||0;
        const rate       = parseFloat(document.getElementById('fRate').value)||0;
        const startDate  = document.getElementById('fStartDate').value;
        const endDate    = document.getElementById('fEndDate').value;
        const paidMonths = parseInt(document.getElementById('fPaidMonths').value)||0;
        if (!monthly) { showToast('월 납입액을 입력해주세요'); return; }
        asset = {...asset, monthly, rate, startDate, endDate, paidMonths, isPolicy};
        if (isPolicy) {
          asset.govMonthly = parseFloat(document.getElementById('fGovMonthly').value)||0;
          asset.bonusRate  = parseFloat(document.getElementById('fBonusRate').value)||0;
        }
      } else if (modalType==='stock') {
        const avgPrice     = parseFloat(document.getElementById('fAvgPrice').value)||0;
        const qty          = parseFloat(document.getElementById('fQty').value)||0;
        const currentPrice = parseFloat(document.getElementById('fCurrentPrice').value)||0;
        if (!avgPrice||!qty) { showToast('평균 매수가와 수량을 입력해주세요'); return; }
        asset = {...asset, avgPrice, qty, currentPrice};
      } else {
        const cashAmount = parseFloat(document.getElementById('fCashAmount').value)||0;
        const memo       = document.getElementById('fMemo').value.trim();
        if (!cashAmount) { showToast('금액을 입력해주세요'); return; }
        asset = {...asset, cashAmount, memo};
      }

      if (!data.assets) data.assets = [];
      if (editId) {
        /* 수정: 재테크 데이터만 업데이트 (가계부는 이미 기록돼 있음) */
        const idx = data.assets.findIndex(a=>a.id===editId);
        if (idx!==-1) data.assets[idx] = asset;
        saveData();
        closeModal();
        renderAll();
        showToast('자산을 수정했어요 ✓');
      } else {
        /* 신규 추가: 재테크에 저장 + 가계부에도 지출 자동 기록 */
        data.assets.push(asset);
        saveData();

        /* 자산 유형별로 가계부에 기록할 금액과 카테고리 결정 */
        let ledgerAmount = 0, ledgerCat = '', ledgerDate = new Date().toISOString().slice(0,10), ledgerMemo = '';

        if (modalType==='savings') {
          /* 적금: 지금까지 납입한 총액 = 월납입 × 납입회차 */
          ledgerAmount = asset.monthly * (asset.paidMonths||0);
          ledgerCat    = '🏦적금납입';
          ledgerDate   = asset.startDate || ledgerDate;
          ledgerMemo   = `${asset.name}${asset.institution?' ('+asset.institution+')':''}`;
        } else if (modalType==='deposit') {
          /* 예금: 원금 한 번에 납입 */
          ledgerAmount = asset.monthly||0;
          ledgerCat    = '💳예금';
          ledgerDate   = asset.startDate || ledgerDate;
          ledgerMemo   = `${asset.name}${asset.institution?' ('+asset.institution+')':''}`;
        } else if (modalType==='stock') {
          /* 주식: 매수 금액 = 평균단가 × 수량 */
          ledgerAmount = (asset.avgPrice||0) * (asset.qty||0);
          ledgerCat    = '📈주식매수';
          ledgerMemo   = `${asset.name}${asset.institution?' ('+asset.institution+')':''}`;
        }
        /* 현금/기타는 가계부에 기록 안 함 — 이미 현금으로 가계부에 있는 것 */

        if (ledgerAmount > 0) {
          addToLedger(ledgerAmount, ledgerCat, ledgerDate, ledgerMemo);
        }

        closeModal();
        renderAll();
        showToast('자산을 추가했어요 ✓' + (ledgerAmount>0 ? ' (가계부에도 기록됨)' : ''));
      }
    }


    /* ════════════════════════════════
       가계부 자동 연동 함수
       재테크에서 자산 추가 시 capital_ledger에 지출 항목을 자동으로 기록
    ════════════════════════════════ */
    async function addToLedger(amount, category, date, memo) {
      /* 1. 현재 가계부 데이터 읽기 (localStorage 우선) */
      let ledger = { transactions: [] };
      const local = localStorage.getItem('mindos_capital_ledger');
      if (local) {
        try { ledger = { ...ledger, ...JSON.parse(local) }; } catch(e){}
      }

      /* 2. 지출 항목 추가 */
      ledger.transactions = ledger.transactions || [];
      ledger.transactions.push({
        id:       Date.now().toString() + '_auto', // '_auto' 붙여서 자동 생성임을 표시
        type:     'expense',
        amount:   amount,
        category: category,
        date:     date,
        memo:     memo,
      });

      /* 3. 저장 시각 찍고 localStorage + Firestore에 저장 */
      ledger._savedAt = Date.now();
      localStorage.setItem('mindos_capital_ledger', JSON.stringify(ledger));
      try {
        await db.collection('mindos').doc('capital_ledger').set(ledger);
      } catch(e) {
        console.error('가계부 Firestore 저장 실패:', e);
      }
    }


    /* ── 자산 삭제 ── */
    function deleteAsset(id) {
      if (!confirm('이 자산을 삭제할까요?')) return;
      data.assets = (data.assets||[]).filter(a=>a.id!==id);
      saveData();
      renderAll();
      showToast('자산을 삭제했어요');
    }


    /* ── 토스트 / 숫자 포맷 ── */
    let toastTimer=null;
    function showToast(msg) {
      const t=document.getElementById('toast');
      t.textContent=msg; t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer=setTimeout(()=>t.classList.remove('show'),2500);
    }
    function fmt(n) { return Math.round(Math.abs(n)).toLocaleString('ko-KR'); }

    document.addEventListener('DOMContentLoaded', loadData);
  </script>
</body>
